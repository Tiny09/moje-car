<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AutoLog Elite</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3202/3202926.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --bg: #f2f5f9;
            --primary: #1a1a1a; /* Tesla Black */
            --accent: #3b82f6; /* Apple Blue */
            --text: #1d1d1f;
            --sub: #86868b;
            --success: #34c759;
            --danger: #ff3b30;
            --girl: #ff2d55;
            --boy: #007aff;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text); 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .container { max-width: 480px; margin: 0 auto; min-height: 100vh; }

        header { 
            padding: 40px 20px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
        }

        header h1 { 
            margin: 0; 
            font-size: 28px; 
            font-weight: 800; 
            letter-spacing: -1px; 
        }

        /* Navigace - Apple Style Floating bar */
        nav { 
            display: flex; 
            overflow-x: auto; 
            padding: 10px 15px; 
            gap: 12px; 
            position: sticky; 
            top: 0; 
            background: rgba(242, 245, 249, 0.8); 
            backdrop-filter: blur(20px); 
            z-index: 1000;
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        nav button { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            padding: 8px 18px; 
            border-radius: 20px; 
            cursor: pointer; 
            color: var(--sub); 
            font-weight: 600; 
            font-size: 13px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        nav button.active { 
            background: var(--primary); 
            color: white; 
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .content { padding: 10px 20px; }
        .section { display: none; animation: fadeIn 0.5s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Tesla Dashboard Cards */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .status-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px; 
            border-radius: 24px; 
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 80px;
        }
        .status-card span { font-size: 10px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }
        .status-card b { font-size: 20px; font-weight: 800; margin-top: 5px; }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 30px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
        }

        h3 { margin: 0 0 20px 0; font-size: 18px; font-weight: 800; }

        /* Form Inputs - Apple Minimalist */
        label { display: block; font-size: 11px; font-weight: 700; color: var(--sub); margin-bottom: 6px; text-transform: uppercase; padding-left: 5px;}
        input, select, textarea { 
            width: 100%; padding: 14px 18px; margin-bottom: 18px; 
            border: 1px solid #e5e7eb; border-radius: 16px; 
            background: #f9fafb; font-size: 15px; transition: 0.3s;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); outline: none; background: white; }
        
        .btn-add { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 18px; border-radius: 20px; font-weight: 700; font-size: 15px; 
            cursor: pointer; transition: 0.3s;
        }
        .btn-add:active { transform: scale(0.96); }

        /* List Items */
        .entry { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px; background: white; border-radius: 22px; 
            margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.02);
            box-shadow: 0 4px 6px rgba(0,0,0,0.01);
        }
        .entry-info b { display: block; font-size: 15px; font-weight: 700; }
        .entry-info span { font-size: 12px; color: var(--sub); }
        .entry-val { font-weight: 800; font-size: 16px; }

        .tag { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; color: white; text-transform: uppercase; }

        #syncBtn { background: var(--glass); border: 1px solid var(--glass-border); padding: 8px 15px; border-radius: 15px; font-weight: 700; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <span style="font-size:12px; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:1px;" id="carPlateHead">SPZ ---</span>
            <h1 id="carNameHead">Moje Auto</h1>
        </div>
        <button id="syncBtn" onclick="syncWithCloud()">Cloud Sync</button>
    </header>
    
    <nav>
        <button onclick="tab('dash')" id="t-dash" class="active">PŘEHLED</button>
        <button onclick="tab('fuel')" id="t-fuel">PALIVO</button>
        <button onclick="tab('service')" id="t-service">SERVIS</button>
        <button onclick="tab('loan')" id="t-loan">ÚVĚR</button>
        <button onclick="tab('info')" id="t-info">NASTAVENÍ</button>
    </nav>

    <div class="content">
        <div id="dash" class="section active">
            <div class="status-grid">
                <div class="status-card" id="stkCard"><span>STK KONČÍ ZA</span><b id="stkVal">-- dní</b></div>
                <div class="status-card" id="oilCard"><span>VÝMĚNA OLEJE</span><b id="oilVal">-- km</b></div>
                <div class="status-card" style="background:var(--primary); color:white;"><span>SPOTŘEBA</span><b id="consVal">0.0 L</b></div>
                <div class="status-card" style="background:#eef2ff;"><span>CENA / 1KM</span><b id="costKmVal" style="color:var(--accent)">0 Kč</b></div>
            </div>
            
            <div class="card">
                <h3>Struktura výdajů</h3>
                <canvas id="mainChart" style="max-height: 250px;"></canvas>
            </div>
        </div>

        <div id="fuel" class="section">
            <div class="card">
                <h3>Zapsat tankování</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label>Datum</label><input type="date" id="fDate"></div>
                    <div><label>Stav Tachometru</label><input type="number" id="fOdo" placeholder="km"></div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label>Litrů</label><input type="number" id="fLiters" placeholder="0.00"></div>
                    <div><label>Cena Celkem (Kč)</label><input type="number" id="fPrice" placeholder="0"></div>
                </div>
                <button class="btn-add" onclick="add('fuel')">Potvrdit tankování</button>
            </div>
            <div id="fuelList"></div>
        </div>

        <div id="service" class="section">
            <div class="card">
                <h3>Servisní záznam</h3>
                <label>Popis opravy</label><input type="text" id="sDesc" placeholder="Např. Výměna brzd">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label>Datum</label><input type="date" id="sDate"></div>
                    <div><label>Cena (Kč)</label><input type="number" id="sPrice" placeholder="0"></div>
                </div>
                <label>Poznámka</label><textarea id="sNote" rows="2"></textarea>
                <button class="btn-add" onclick="add('service')">Uložit do historie</button>
            </div>
            <div id="serviceList"></div>
        </div>

        <div id="loan" class="section">
            <div class="status-grid">
                <div class="status-card" style="border-bottom: 4px solid var(--boy)"><span>PLATÍM JÁ</span><b id="boyVal">0 Kč</b></div>
                <div class="status-card" style="border-bottom: 4px solid var(--girl)"><span>PŘÍTELKYNĚ</span><b id="girlVal">0 Kč</b></div>
            </div>
            <div class="card">
                <h3>Zapsat splátku</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label>Plátce</label><select id="lWho"><option value="Já">Já</option><option value="Přítelkyně">Přítelkyně</option><option value="Oba">Půl na půl</option></select></div>
                    <div><label>Kč</label><input type="number" id="lVal"></div>
                </div>
                <label>Poznámka</label><input type="text" id="lNote">
                <button class="btn-add" onclick="add('loan')">Potvrdit splátku</button>
            </div>
            <div id="loanRem" class="card" style="background:var(--primary); color:white; text-align:center;">Zbývá doplatit: 0 Kč</div>
            <div id="loanList"></div>
        </div>

        <div id="info" class="section">
            <div class="card">
                <h3>Konfigurace</h3>
                <label>Model auta</label><input type="text" id="iMod" onchange="saveCfg()">
                <label>SPZ</label><input type="text" id="iSpz" onchange="saveCfg()">
                <label>Limit pro výměnu oleje (km)</label><input type="number" id="iOil" onchange="saveCfg()">
                <label>Příští STK</label><input type="date" id="iStk" onchange="saveCfg()">
                <hr style="margin: 20px 0; opacity: 0.1;">
                <label>Celkový úvěr (Kč)</label><input type="number" id="lTotal" onchange="saveCfg()">
                <label>Akontace (Kč)</label><input type="number" id="lAkon" onchange="saveCfg()">
                <label>Měsíční splátka (Kč)</label><input type="number" id="lMonth" onchange="saveCfg()">
                <label>Cloud URL</label><input type="text" id="scriptUrl" onchange="saveCfg()">
            </div>
            <button onclick="exportJSON()" style="width:100%; padding:15px; border:none; background:none; color:var(--sub); font-size:12px;">Stáhnout záložní soubor</button>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('autoMasterDB')) || { f:[], s:[], l:{ t:0, a:0, m:0, h:[] }, i:{ url:'' } };
    let chart = null;

    function tab(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        document.getElementById('t-'+name).classList.add('active');
        if(name === 'dash') render();
    }

    function saveCfg() {
        db.i = { m: val('iMod'), s: val('iSpz'), oil: num('iOil'), stk: val('iStk'), url: val('scriptUrl') };
        db.l.t = num('lTotal'); db.l.a = num('lAkon'); db.l.m = num('lMonth');
        save();
        render();
    }

    function add(type) {
        const id = Date.now();
        if(type==='fuel') db.f.push({ id, d:val('fDate'), o:num('fOdo'), l:num('fLiters'), p:num('fPrice') });
        if(type==='service') db.s.push({ id, d:val('sDate'), desc:val('sDesc'), p:num('sPrice'), n:val('sNote') });
        if(type==='loan') db.l.h.push({ id, who:val('lWho'), p:num('lVal')||db.l.m, n:val('lNote'), d:new Date().toLocaleDateString('cs-CZ') });
        save();
        ['fPrice','fLiters','sDesc','sPrice','sNote','lNote','lVal'].forEach(i => { if(document.getElementById(i)) document.getElementById(i).value=''; });
        render();
    }

    function remove(type, id) {
        if(!confirm('Smazat?')) return;
        if(type==='loan') db.l.h = db.l.h.filter(x=>x.id!==id);
        else if(type==='fuel') db.f = db.f.filter(x=>x.id!==id);
        else if(type==='service') db.s = db.s.filter(x=>x.id!==id);
        save();
        render();
    }

   // ZDE DOPLŇ SVÉ ÚDAJE ZE SUPABASE (Project Settings -> API)
const SUPABASE_URL = "https://cbcrfxhmlknjylckfmtz.supabase.co";
const SUPABASE_KEY = "sb_publishable_rQEXr6wwdvQAl6mI444xbw_Twsyi8GzY";
const USER_IDENTIFIER = "moje_auto_id_1"; // Libovolné jméno pro tvá data

async function syncWithCloud() {
    const btn = document.getElementById('syncBtn');
    btn.innerText = "⏳ ..."; btn.disabled = true;

    try {
        // 1. POKUS O STAŽENÍ DAT
        const response = await fetch(`${SUPABASE_URL}/rest/v1/autos?user_id=eq.${USER_IDENTIFIER}`, {
            headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
        });
        const result = await response.json();

        if (result.length > 0) {
            // Pokud na serveru data jsou, porovnáme je (jednoduchá synchronizace)
            if (confirm("Na cloudu jsou data. Chceš je stáhnout do mobilu? (OK = stáhnout, Zrušit = přepsat cloud těmito daty)")) {
                db = result[0].data;
                save();
                render();
                alert("✅ Data stažena!");
                btn.innerText = "Cloud Sync"; btn.disabled = false;
                return;
            }
        }

        // 2. ODESLÁNÍ DAT NA CLOUD (Upsert - vloží nebo aktualizuje)
        await fetch(`${SUPABASE_URL}/rest/v1/autos`, {
            method: 'POST',
            headers: { 
                "apikey": SUPABASE_KEY, 
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "resolution=merge-duplicates" 
            },
            body: JSON.stringify({
                user_id: USER_IDENTIFIER,
                data: db
            })
        });

        alert("✅ Data bezpečně uložena v Supabase cloudu!");
    } catch (e) {
        console.error(e);
        alert("❌ Chyba spojení se Supabase.");
    }
    btn.innerText = "Cloud Sync"; btn.disabled = false;
}
    }

    function save() { localStorage.setItem('autoMasterDB', JSON.stringify(db)); }

    function render() {
        document.getElementById('carNameHead').innerText = db.i.m || 'Moje Auto';
        document.getElementById('carPlateHead').innerText = db.i.s || 'SPZ ---';
        ['iMod','iSpz','iOil','iStk','lTotal','lAkon','lMonth','scriptUrl'].forEach(k => {
            let target = k.startsWith('l') ? db.l[k.charAt(1).toLowerCase()] : (k === 'scriptUrl' ? db.i.url : db.i[k.substring(1).toLowerCase()]);
            document.getElementById(k).value = target || '';
        });

        let lastOdo = db.f.length > 0 ? Math.max(...db.f.map(x=>x.o)) : 0;
        if(db.i.stk) {
            const diff = Math.ceil((new Date(db.i.stk) - new Date()) / 86400000);
            document.getElementById('stkVal').innerText = diff + ' dní';
            document.getElementById('stkCard').style.background = diff < 30 ? '#fee2e2' : 'var(--glass)';
        }
        if(db.i.oil && lastOdo) {
            const diff = db.i.oil - lastOdo;
            document.getElementById('oilVal').innerText = diff + ' km';
            document.getElementById('oilCard').style.background = diff < 1000 ? '#fee2e2' : 'var(--glass)';
        }

        let fT = db.f.reduce((s,x)=>s+x.p,0), sT = db.s.reduce((s,x)=>s+x.p,0), lP = db.l.h.reduce((s,x)=>s+x.p,0) + db.l.a;
        if(db.f.length > 1) {
            const sorted = [...db.f].sort((a,b)=>a.o-b.o);
            const dist = sorted[sorted.length-1].o - sorted[0].o;
            const lts = sorted.slice(1).reduce((s,x)=>s+x.l,0);
            document.getElementById('consVal').innerText = dist > 0 ? ((lts/dist)*100).toFixed(1) + ' L' : '0.0 L';
            document.getElementById('costKmVal').innerText = dist > 0 ? ((fT+sT+lP)/dist).toFixed(0) + ' Kč' : '0 Kč';
        }

        renderList('fuelList', db.f, x=>`${x.l}L • ${x.o} km`, x=>x.p, 'fuel');
        renderList('serviceList', db.s, x=>x.desc, x=>x.p, 'service', true);
        
        let b=0, g=0; const lL = document.getElementById('loanList'); lL.innerHTML = '';
        db.l.h.sort((a,b)=>b.id-a.id).forEach(x => {
            if(x.who==='Já') b+=x.p; else if(x.who==='Přítelkyně') g+=x.p; else { b+=x.p/2; g+=x.p/2; }
            lL.innerHTML += `<div class="entry"><div class="entry-info"><b><span class="tag" style="background:${x.who==='Já'?'var(--boy)':'var(--girl)'}">${x.who}</span> ${x.p} Kč</b><span>${x.d} • ${x.n||''}</span></div><button onclick="remove('loan',${x.id})" style="background:none; border:none; color:var(--danger); font-size:18px;">×</button></div>`;
        });
        document.getElementById('boyVal').innerText = b.toLocaleString() + ' Kč';
        document.getElementById('girlVal').innerText = g.toLocaleString() + ' Kč';
        document.getElementById('loanRem').innerText = "Zbývá doplatit: " + (db.l.t - lP).toLocaleString() + " Kč";

        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('mainChart'), {
            type:'doughnut', data:{labels:['Palivo','Servis','Úvěr'], datasets:[{data:[fT,sT,lP], backgroundColor:['#3b82f6','#1a1a1a','#f5f5f7'], borderWidth:0}]},
            options:{cutout:'70%', plugins:{legend:{position:'bottom', labels:{font:{weight:'bold'}}}}}
        });
    }

    function renderList(id, data, titleFn, valFn, char, hasNote=false) {
        const el = document.getElementById(id); el.innerHTML = '';
        data.sort((a,b)=>b.id-a.id).forEach(x => {
            el.innerHTML += `<div class="entry"><div class="entry-info"><b>${titleFn(x)}</b><span>${x.d||''} ${hasNote && x.n ? '| '+x.n : ''}</span></div><div class="entry-val">${valFn(x)} Kč <button onclick="remove('${char}',${x.id})" style="background:none; border:none; color:var(--danger); margin-left:10px;">×</button></div></div>`;
        });
    }

    function val(i) { return document.getElementById(i).value; }
    function num(i) { return Number(document.getElementById(i).value); }
    function exportJSON() {
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type:'application/json'}));
        a.download = 'auto_backup.json'; a.click();
    }
    render();
</script>
</body>
</html>
