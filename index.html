<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AutoLog Elite</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3202/3202926.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.9); --glass-border: rgba(255, 255, 255, 0.5);
            --bg: #f2f5f9; --primary: #1a1a1a; --accent: #007aff; --text: #1d1d1f;
            --sub: #86868b; --danger: #ff3b30; --girl: #ff2d55; --boy: #007aff;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text); -webkit-font-smoothing: antialiased; padding-bottom: env(safe-area-inset-bottom); }

        /* RESPONSIVE CONTAINER: Na PC širší, na mobilu 100% */
        .container { max-width: 1000px; margin: 0 auto; min-height: 100vh; position: relative; }

        header { padding: 40px 20px 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        header h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -1px; }

        nav { display: flex; overflow-x: auto; padding: 15px 20px; gap: 10px; position: sticky; top: 0; background: rgba(242, 245, 249, 0.9); backdrop-filter: blur(20px); z-index: 9999; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav button { background: white; border: 1px solid #ddd; padding: 10px 20px; border-radius: 20px; cursor: pointer; color: var(--sub); font-weight: 700; font-size: 13px; transition: 0.2s; white-space: nowrap; flex-shrink: 0; }
        nav button.active { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); }

        .content { padding: 15px 20px; }
        .section { display: none; animation: fadeIn 0.3s ease-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* CSS GRID PRO PC i MOBIL */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .desktop-split { display: grid; grid-template-columns: 1fr; gap: 20px; align-items: start; }

        /* TADY SE DĚJE KOUZLO PRO POČÍTAČE (Šířka nad 768px) */
        @media (min-width: 768px) {
            .status-grid { grid-template-columns: 1fr 1fr 1fr 1fr; } /* 4 karty vedle sebe */
            .desktop-split { grid-template-columns: 1fr 1fr; } /* Formulář vlevo, historie vpravo */
            header, nav, .content { padding-left: 40px; padding-right: 40px; }
        }

        .status-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 20px; border-radius: 24px; display: flex; flex-direction: column; justify-content: space-between; }
        .status-card span { font-size: 10px; font-weight: 700; color: var(--sub); text-transform: uppercase; }
        .status-card b { font-size: 20px; font-weight: 800; margin-top: 5px; }

        .card { background: white; padding: 25px; border-radius: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        h3 { margin: 0 0 20px 0; font-size: 18px; font-weight: 800; }

        label { display: block; font-size: 11px; font-weight: 700; color: var(--sub); margin-bottom: 6px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 18px; border: 1px solid #e5e7eb; border-radius: 16px; background: #f9fafb; font-size: 15px; box-sizing: border-box; font-family: inherit; }
        .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: 700; cursor: pointer; font-family: inherit; transition: 0.2s; }
        .btn-add:hover { background: #333; }

        .entry { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: white; border-radius: 22px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .tag { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; color: white; }

        #syncBtn { background: #34c759; color: white; border: none; padding: 8px 15px; border-radius: 15px; font-weight: 700; font-size: 12px; cursor: pointer; transition: 0.2s; }
        #syncBtn:hover { transform: scale(1.05); }
        .chart-container { max-width: 400px; margin: 0 auto; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <span style="font-size:12px; font-weight:700; color:var(--sub);" id="carPlateHead">SPZ ---</span>
            <h1 id="carNameHead">Moje Auto</h1>
        </div>
        <button id="syncBtn" onclick="syncWithCloud()">Cloud Sync</button>
    </header>
    
    <nav>
        <button onclick="tab('dash')" id="t-dash" class="active">PŘEHLED</button>
        <button onclick="tab('fuel')" id="t-fuel">PALIVO</button>
        <button onclick="tab('service')" id="t-service">SERVIS</button>
        <button onclick="tab('loan')" id="t-loan">ÚVĚR</button>
        <button onclick="tab('info')" id="t-info">NASTAVENÍ</button>
    </nav>

    <div class="content">
        <div id="dash" class="section active">
            <div class="status-grid">
                <div class="status-card" id="stkCard"><span>STK KONČÍ ZA</span><b id="stkVal">-- dní</b></div>
                <div class="status-card" id="oilCard"><span>VÝMĚNA OLEJE</span><b id="oilVal">-- km</b></div>
                <div class="status-card" style="background:var(--primary); color:white;"><span>SPOTŘEBA</span><b id="consVal">0.0 L</b></div>
                <div class="status-card" style="background:#eef2ff;"><span>CENA / 1KM</span><b id="costKmVal" style="color:var(--accent)">0 Kč</b></div>
            </div>
            <div class="card chart-container">
                <h3 style="text-align: center;">Struktura výdajů</h3>
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <div id="fuel" class="section">
            <div class="desktop-split">
                <div class="card">
                    <h3>Zapsat tankování</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div><label>Datum</label><input type="date" id="fDate"></div>
                        <div><label>Tachometr</label><input type="number" id="fOdo"></div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div><label>Litrů</label><input type="number" id="fLiters"></div>
                        <div><label>Cena Celkem</label><input type="number" id="fPrice"></div>
                    </div>
                    <button class="btn-add" onclick="add('fuel')">Uložit tankování</button>
                </div>
                <div id="fuelList"></div>
            </div>
        </div>

        <div id="service" class="section">
            <div class="desktop-split">
                <div class="card">
                    <h3>Nový servisní záznam</h3>
                    <label>Popis opravy</label><input type="text" id="sDesc" placeholder="Např. výměna oleje">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div><label>Datum</label><input type="date" id="sDate"></div>
                        <div><label>Cena (Kč)</label><input type="number" id="sPrice"></div>
                    </div>
                    <button class="btn-add" onclick="add('service')">Uložit servis</button>
                </div>
                <div id="serviceList"></div>
            </div>
        </div>

        <div id="loan" class="section">
            <div class="status-grid" style="grid-template-columns: 1fr 1fr;">
                <div class="status-card" style="border-bottom: 4px solid var(--boy)"><span>PLATÍM JÁ</span><b id="boyVal">0 Kč</b></div>
                <div class="status-card" style="border-bottom: 4px solid var(--girl)"><span>ONA</span><b id="girlVal">0 Kč</b></div>
            </div>
            <div class="desktop-split">
                <div class="card">
                    <h3>Nová splátka</h3>
                    <label>Kdo platí?</label>
                    <select id="lWho"><option value="Já">Já</option><option value="Přítelkyně">Přítelkyně</option></select>
                    <label>Částka (Kč)</label>
                    <input type="number" id="lVal">
                    <button class="btn-add" onclick="add('loan')">Uložit splátku</button>
                </div>
                <div id="loanList"></div>
            </div>
        </div>

        <div id="info" class="section">
            <div class="card">
                <h3>Vozidlo a parametry</h3>
                <div class="desktop-split">
                    <div>
                        <label>Model auta</label><input type="text" id="iMod" onchange="saveCfg()">
                        <label>SPZ</label><input type="text" id="iSpz" onchange="saveCfg()">
                        <label>Příští STK</label><input type="date" id="iStk" onchange="saveCfg()">
                    </div>
                    <div>
                        <label>Limit Olej (Tachometr km)</label><input type="number" id="iOil" onchange="saveCfg()">
                        <label>Úvěr Celkem (Původní cena v Kč)</label><input type="number" id="lTotal" onchange="saveCfg()">
                        <button onclick="exportJSON()" style="width:100%; padding:15px; margin-top:10px; background:var(--bg); border:1px solid #ddd; border-radius:15px; color:var(--text); font-weight:bold; cursor:pointer;">💾 Uložit zálohu na disk</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- DOPLŇ SVÉ SUPABASE ÚDAJE ZDE ---
    const SUPABASE_URL = "https://cbcrfxhmlknjylckfmtz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_rQEXr6wwdvQAl6mI444xbw_Twsyi8Gz";
    const USER_ID = "moje_auto_elite_1";

    let db = JSON.parse(localStorage.getItem('autoMasterDB')) || { f:[], s:[], l:{ t:0, a:0, m:0, h:[] }, i:{} };
    let chart = null;

    function tab(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        document.getElementById('t-' + name).classList.add('active');
        if(name === 'dash') render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function saveCfg() {
        db.i = { m: val('iMod'), s: val('iSpz'), oil: num('iOil'), stk: val('iStk') };
        db.l.t = num('lTotal');
        save(); render();
    }

    function add(type) {
        const id = Date.now();
        if(type==='fuel') db.f.push({ id, d:val('fDate'), o:num('fOdo'), l:num('fLiters'), p:num('fPrice') });
        if(type==='service') db.s.push({ id, d:val('sDate'), desc:val('sDesc'), p:num('sPrice') });
        if(type==='loan') db.l.h.push({ id, who:val('lWho'), p:num('lVal'), d:new Date().toLocaleDateString('cs-CZ') });
        save(); render();
        ['fOdo','fLiters','fPrice','sDesc','sPrice','lVal'].forEach(i => { if(document.getElementById(i)) document.getElementById(i).value=''; });
    }

    function remove(type, id) {
        if(!confirm('Opravdu smazat záznam?')) return;
        if(type==='loan') db.l.h = db.l.h.filter(x=>x.id!==id);
        else if(type==='fuel') db.f = db.f.filter(x=>x.id!==id);
        else if(type==='service') db.s = db.s.filter(x=>x.id!==id);
        save(); render();
    }

    async function syncWithCloud() {
        if(SUPABASE_URL === "VLOZ_SVOJI_URL") return alert("Nejdříve vlož Supabase údaje do kódu!");
        const btn = document.getElementById('syncBtn');
        btn.innerText = "⏳..."; btn.disabled = true;
        try {
            const resp = await fetch(`${SUPABASE_URL}/rest/v1/autos?user_id=eq.${USER_ID}`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const result = await resp.json();
            if (result.length > 0 && confirm("Data jsou na cloudu. Stáhnout do zařízení? (Zrušit = Přepsat cloud daty z tohoto zařízení)")) {
                db = result[0].data; save(); render();
            } else {
                await fetch(`${SUPABASE_URL}/rest/v1/autos`, {
                    method: 'POST',
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates" },
                    body: JSON.stringify({ user_id: USER_ID, data: db })
                });
                alert("✅ Cloud úspěšně aktualizován!");
            }
        } catch (e) { alert("❌ Chyba spojení."); }
        btn.innerText = "Cloud Sync"; btn.disabled = false;
    }

    function save() { localStorage.setItem('autoMasterDB', JSON.stringify(db)); }

    function render() {
        document.getElementById('carNameHead').innerText = db.i.m || 'Moje Auto';
        document.getElementById('carPlateHead').innerText = db.i.s || 'SPZ ---';
        document.getElementById('iMod').value = db.i.m || '';
        document.getElementById('iSpz').value = db.i.s || '';
        document.getElementById('iOil').value = db.i.oil || '';
        document.getElementById('iStk').value = db.i.stk || '';
        document.getElementById('lTotal').value = db.l.t || '';

        let lastOdo = db.f.length > 0 ? Math.max(...db.f.map(x=>x.o)) : 0;
        if(db.i.stk) {
            const diff = Math.ceil((new Date(db.i.stk) - new Date()) / 86400000);
            document.getElementById('stkVal').innerText = diff > 0 ? diff + ' dní' : 'Prošlá!';
            document.getElementById('stkCard').style.background = diff < 30 ? '#fee2e2' : 'var(--glass)';
        }
        if(db.i.oil && lastOdo) {
            const diff = db.i.oil - lastOdo;
            document.getElementById('oilVal').innerText = diff + ' km';
            document.getElementById('oilCard').style.background = diff < 1000 ? '#fee2e2' : 'var(--glass)';
        }

        let fT = db.f.reduce((s,x)=>s+x.p,0), sT = db.s.reduce((s,x)=>s+x.p,0), lP = db.l.h.reduce((s,x)=>s+x.p,0);
        if(db.f.length > 1) {
            const sorted = [...db.f].sort((a,b)=>a.o-b.o);
            const dist = sorted[sorted.length-1].o - sorted[0].o;
            const lts = sorted.slice(1).reduce((s,x)=>s+x.l, 0);
            document.getElementById('consVal').innerText = dist > 0 ? ((lts/dist)*100).toFixed(1) + ' L' : '0.0 L';
            document.getElementById('costKmVal').innerText = dist > 0 ? ((fT+sT+lP)/dist).toFixed(0) + ' Kč' : '0 Kč';
        }

        renderList('fuelList', db.f, x=>`${x.l} L • ${x.o} km`, x=>x.p, 'fuel');
        renderList('serviceList', db.s, x=>x.desc, x=>x.p, 'service');
        
        let b=0, g=0; const lL = document.getElementById('loanList'); lL.innerHTML = '';
        db.l.h.sort((a,b)=>b.id-a.id).forEach(x => {
            if(x.who==='Já') b+=x.p; else g+=x.p;
            lL.innerHTML += `<div class="entry"><div><span class="tag" style="background:${x.who==='Já'?'var(--boy)':'var(--girl)'}">${x.who}</span> <b>${x.p} Kč</b><br><small>${x.d}</small></div><button onclick="remove('loan',${x.id})" style="border:none; background:none; color:var(--danger); font-size:24px; cursor:pointer;">×</button></div>`;
        });
        document.getElementById('boyVal').innerText = b.toLocaleString() + ' Kč';
        document.getElementById('girlVal').innerText = g.toLocaleString() + ' Kč';

        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('mainChart'), {
            type:'doughnut', data:{labels:['Palivo','Servis','Úvěr'], datasets:[{data:[fT,sT,lP], backgroundColor:['#007aff','#1a1a1a','#cbd5e1'], borderWidth:0}]},
            options:{cutout:'70%', plugins:{legend:{position:'bottom'}}}
        });
    }

    function renderList(id, data, titleFn, valFn, char) {
        const el = document.getElementById(id); el.innerHTML = '';
        data.sort((a,b)=>b.id-a.id).forEach(x => {
            el.innerHTML += `<div class="entry"><div><b>${titleFn(x)}</b><br><small>${x.d||''}</small></div><div><b style="font-size:16px;">${valFn(x)} Kč</b> <button onclick="remove('${char}',${x.id})" style="border:none; background:none; color:var(--danger); margin-left:15px; font-size:24px; cursor:pointer;">×</button></div></div>`;
        });
    }

    function val(i) { return document.getElementById(i).value; }
    function num(i) { return Number(document.getElementById(i).value); }
    function exportJSON() {
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type:'application/json'}));
        a.download = 'auto_backup.json'; a.click();
    }
    render();
</script>
</body>
</html>
