<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoLog Cloud Master</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f0f4f8; --card: #ffffff; --primary: #2563eb; --text: #0f172a;
            --sub: #64748b; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
            --girl: #ec4899; --boy: #3b82f6; --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        header { background: white; padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 18px; font-weight: 900; color: var(--primary); }

        nav { display: flex; overflow-x: auto; padding: 12px; gap: 8px; sticky; top: 0; background: rgba(240, 244, 248, 0.9); backdrop-filter: blur(10px); z-index: 100; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav button { background: white; border: 1px solid #e2e8f0; padding: 10px 16px; border-radius: 12px; cursor: pointer; color: var(--sub); font-weight: 700; font-size: 13px; white-space: nowrap; transition: 0.2s; }
        nav button.active { background: var(--primary); color: white; border-color: var(--primary); }

        .content { padding: 0 15px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: var(--shadow); }
        h3 { margin: 0 0 15px 0; font-size: 16px; font-weight: 800; border-left: 4px solid var(--primary); padding-left: 10px; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-item { padding: 15px; border-radius: 16px; color: white; text-align: center; }
        .status-item span { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
        .status-item b { font-size: 17px; display: block; margin-top: 4px; }
        .bg-ok { background: var(--success); } .bg-warn { background: var(--warning); } .bg-alert { background: var(--danger); } .bg-dark { background: #1e293b; }

        label { display: block; font-size: 11px; font-weight: 800; color: var(--sub); margin-bottom: 4px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; font-size: 14px; box-sizing: border-box; }
        
        .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .entry { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border-radius: 14px; margin-bottom: 8px; border: 1px solid #f1f5f9; }
        .entry-note { font-size: 11px; color: var(--sub); font-style: italic; display: block; }
        .stat-badge { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 5px; color: white; margin-right: 5px; }

        #syncBtn { background: #10b981; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        #syncMsg { font-size: 10px; text-align: center; margin-bottom: 10px; color: var(--sub); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="headTitle">AutoLog Cloud</h1>
        <button id="syncBtn" onclick="syncWithCloud()">☁️ SYNC</button>
    </header>
    <div id="syncMsg">Uloženo v prohlížeči</div>
    
    <nav>
        <button onclick="tab('dash')" id="t-dash" class="active">📊 PŘEHLED</button>
        <button onclick="tab('fuel')" id="t-fuel">⛽ PALIVO</button>
        <button onclick="tab('service')" id="t-service">🛠️ SERVIS</button>
        <button onclick="tab('loan')" id="t-loan">💰 ÚVĚR</button>
        <button onclick="tab('info')" id="t-info">⚙️ NASTAVENÍ</button>
    </nav>

    <div class="content">
        <div id="dash" class="section active">
            <div class="status-grid">
                <div id="stkWidget" class="status-item bg-dark"><span>STK KONČÍ ZA</span><b>-- dní</b></div>
                <div id="oilWidget" class="status-item bg-dark"><span>OLEJ ZA</span><b>-- km</b></div>
                <div class="status-item bg-dark" style="background:#4361ee"><span>SPOTŘEBA</span><b id="dashCons">0.0 L</b></div>
                <div class="status-item bg-dark" style="background:#1e293b"><span>CENA / 1KM</span><b id="dashCostKm">0 Kč</b></div>
            </div>
            <div class="card">
                <h3>Struktura nákladů</h3>
                <div style="height: 220px;"><canvas id="mainChart"></canvas></div>
            </div>
        </div>

        <div id="fuel" class="section">
            <div class="card">
                <h3>Zapsat tankování</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <input type="date" id="fDate"><input type="number" id="fOdo" placeholder="km">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <input type="number" id="fLiters" placeholder="Litrů"><input type="number" id="fPrice" placeholder="Kč Celkem">
                </div>
                <button class="btn-add" onclick="add('fuel')">ULOŽIT TANKOVÁNÍ</button>
            </div>
            <div id="fuelList"></div>
        </div>

        <div id="service" class="section">
            <div class="card">
                <h3>Servisní kniha</h3>
                <input type="text" id="sDesc" placeholder="Co se dělalo?">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <input type="date" id="sDate"><input type="number" id="sPrice" placeholder="Cena Kč">
                </div>
                <textarea id="sNote" rows="2" placeholder="Poznámka..."></textarea>
                <button class="btn-add" onclick="add('service')" style="background:#0f172a">ULOŽIT SERVIS</button>
            </div>
            <div id="serviceList"></div>
        </div>

        <div id="loan" class="section">
            <div class="status-grid">
                <div class="status-item bg-dark" style="background:var(--boy)"><span>PLATÍM JÁ</span><b id="loanBoy">0 Kč</b></div>
                <div class="status-item bg-dark" style="background:var(--girl)"><span>PŘÍTELKYNĚ</span><b id="loanGirl">0 Kč</b></div>
            </div>
            <div class="card">
                <h3>Nová splátka</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <select id="lWho"><option value="Já">Já</option><option value="Přítelkyně">Přítelkyně</option><option value="Oba">Půl na půl</option></select>
                    <input type="number" id="lVal" placeholder="Kč">
                </div>
                <input type="text" id="lNote" placeholder="Poznámka...">
                <button class="btn-add" onclick="add('loan')">ZAPSAT SPLÁTKU</button>
            </div>
            <div id="loanRemain" class="card" style="background:var(--primary); color:white; text-align:center; font-weight:bold;">Zbývá: 0 Kč</div>
            <div id="loanList"></div>
        </div>

        <div id="info" class="section">
            <div class="card" style="border: 2px solid #10b981;">
                <h3>☁️ Cloud Sync (Google Disk)</h3>
                <label>Script URL</label>
                <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/..." oninput="saveCfg()">
            </div>
            <div class="card">
                <h3>Vozidlo & Parametry</h3>
                <label>Model</label><input type="text" id="iMod" oninput="saveCfg()">
                <label>SPZ</label><input type="text" id="iSpz" oninput="saveCfg()">
                <label>Olej limit (km)</label><input type="number" id="iOil" oninput="saveCfg()">
                <label>STK do</label><input type="date" id="iStk" oninput="saveCfg()">
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0">
                <label>Úvěr celkem</label><input type="number" id="lTotal" oninput="saveCfg()">
                <label>Akontace</label><input type="number" id="lAkon" oninput="saveCfg()">
                <label>Měsíční splátka</label><input type="number" id="lMonth" oninput="saveCfg()">
            </div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('autoMasterDB')) || { f:[], s:[], l:{ t:0, a:0, m:0, h:[] }, i:{ url:'' } };
    let chart = null;

    function tab(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        document.getElementById('t-'+name).classList.add('active');
        if(name === 'dash') render();
    }

    function saveCfg() {
        db.i = { m: val('iMod'), s: val('iSpz'), oil: num('iOil'), stk: val('iStk'), url: val('scriptUrl') };
        db.l.t = num('lTotal'); db.l.a = num('lAkon'); db.l.m = num('lMonth');
        save();
    }

    function add(type) {
        const id = Date.now();
        if(type==='fuel') db.f.push({ id, d:val('fDate'), o:num('fOdo'), l:num('fLiters'), p:num('fPrice') });
        if(type==='service') db.s.push({ id, d:val('sDate'), desc:val('sDesc'), p:num('sPrice'), n:val('sNote') });
        if(type==='loan') db.l.h.push({ id, who:val('lWho'), p:num('lVal')||db.l.m, n:val('lNote'), d:new Date().toLocaleDateString('cs-CZ') });
        save();
        ['fPrice','fLiters','sDesc','sPrice','sNote','lNote','lVal'].forEach(i => { if(document.getElementById(i)) document.getElementById(i).value=''; });
    }

    function remove(type, id) {
        if(!confirm('Smazat?')) return;
        if(type==='loan') db.l.h = db.l.h.filter(x=>x.id!==id);
        else db[type.charAt(0)] = db[type.charAt(0)].filter(x=>x.id!==id);
        save();
    }

    async function syncWithCloud() {
    if (!db.i.url) return alert("Vlož URL skriptu v nastavení!");
    const btn = document.getElementById('syncBtn');
    const msg = document.getElementById('syncMsg');
    
    btn.innerText = "⏳ Synchronizuji...";
    btn.disabled = true;

    try {
        // 1. STAŽENÍ DAT (Načtení z cloudu)
        // Přidali jsme { redirect: 'follow' }, aby prohlížeč následoval přesměrování Googlu
        const resp = await fetch(db.i.url + "?action=load", {
            method: 'GET',
            redirect: 'follow'
        });
        
        const cloudText = await resp.text(); // Nejdřív načteme jako text
        
        if (cloudText && cloudText !== "null" && cloudText !== "") {
            const cloudData = JSON.parse(cloudText);
            // Jednoduchá ochrana: vezmeme data z cloudu, jen pokud tam něco je
            if (cloudData.f || cloudData.s || cloudData.l) {
                db = cloudData;
                save(); // Uložíme lokálně to, co přišlo z cloudu
                msg.innerText = "✅ Data stažena z cloudu";
            }
        }

        // 2. ODESLÁNÍ DAT (Uložení do cloudu)
        // Google Script u POST vyžaduje mód 'no-cors', pokud nechceme řešit složité certifikáty
        await fetch(db.i.url + "?action=save", {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(db)
        });

        msg.innerText = "✅ Synchronizováno: " + new Date().toLocaleTimeString();
    } catch (e) {
        console.error("Chyba:", e);
        msg.innerText = "❌ Chyba spojení (zkontroluj URL a Anyone přístup)";
    } finally {
        btn.innerText = "☁️ SYNC";
        btn.disabled = false;
        render();
    }
}

    function save() { localStorage.setItem('autoMasterDB', JSON.stringify(db)); render(); }

    function render() {
        // Sync Inputs
        document.getElementById('headTitle').innerText = db.i.m || 'AutoLog Cloud';
        document.getElementById('scriptUrl').value = db.i.url || '';
        ['iMod','iSpz','iOil','iStk','lTotal','lAkon','lMonth'].forEach(k => {
            let target = k.startsWith('l') ? db.l[k.charAt(1).toLowerCase()] : db.i[k.substring(1).toLowerCase()];
            document.getElementById(k).value = target || '';
        });

        // Dashboard logic
        let lastOdo = db.f.length > 0 ? Math.max(...db.f.map(x=>x.o)) : 0;
        if(db.i.stk) {
            const diff = Math.ceil((new Date(db.i.stk) - new Date()) / 86400000);
            document.getElementById('stkWidget').querySelector('b').innerText = diff + ' dní';
            document.getElementById('stkWidget').className = 'status-item ' + (diff < 30 ? 'bg-alert' : (diff < 90 ? 'bg-warn' : 'bg-ok'));
        }
        if(db.i.oil && lastOdo) {
            const diff = db.i.oil - lastOdo;
            document.getElementById('oilWidget').querySelector('b').innerText = diff + ' km';
            document.getElementById('oilWidget').className = 'status-item ' + (diff < 1000 ? 'bg-alert' : (diff < 3000 ? 'bg-warn' : 'bg-ok'));
        }

        let fT = db.f.reduce((s,x)=>s+x.p,0), sT = db.s.reduce((s,x)=>s+x.p,0), lP = db.l.h.reduce((s,x)=>s+x.p,0) + db.l.a;
        if(db.f.length > 1) {
            const sorted = [...db.f].sort((a,b)=>a.o-b.o);
            const dist = sorted[sorted.length-1].o - sorted[0].o;
            const lts = sorted.slice(1).reduce((s,x)=>s+x.l,0);
            document.getElementById('dashCons').innerText = dist > 0 ? ((lts/dist)*100).toFixed(1) + ' L' : '0.0 L';
            document.getElementById('dashCostKm').innerText = dist > 0 ? ((fT+sT+lP)/dist).toFixed(1) + ' Kč' : '0 Kč';
        }

        renderList('fuelList', db.f, x=>`${x.l}L • ${x.o} km`, x=>x.p, 'f');
        renderList('serviceList', db.s, x=>x.desc, x=>x.p, 's', true);
        
        let b=0, g=0; const lL = document.getElementById('loanList'); lL.innerHTML = '<h3>Splátky</h3>';
        db.l.h.sort((a,b)=>b.id-a.id).forEach(x => {
            if(x.who==='Já') b+=x.p; else if(x.who==='Přítelkyně') g+=x.p; else { b+=x.p/2; g+=x.p/2; }
            lL.innerHTML += `<div class="entry"><div><span class="stat-badge" style="background:${x.who==='Já'?'#3b82f6':'#ec4899'}">${x.who}</span><small>${x.d}</small><span class="entry-note">${x.n||''}</span></div><div style="font-weight:800">${x.p} Kč <span onclick="remove('loan',${x.id})" style="color:red; cursor:pointer">×</span></div></div>`;
        });
        document.getElementById('loanBoy').innerText = b.toLocaleString() + ' Kč';
        document.getElementById('loanGirl').innerText = g.toLocaleString() + ' Kč';
        document.getElementById('loanRemain').innerText = "Zbývá doplatit: " + (db.l.t - lP).toLocaleString() + " Kč";

        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('mainChart'), {
            type:'doughnut', data:{labels:['Palivo','Servis','Úvěr'], datasets:[{data:[fT,sT,lP], backgroundColor:['#3b82f6','#1e293b','#4361ee'], borderWidth:0}]},
            options:{cutout:'75%', plugins:{legend:{position:'bottom'}}}
        });
    }

    function renderList(id, data, titleFn, valFn, char, hasNote=false) {
        const el = document.getElementById(id); el.innerHTML = '<h3>Historie</h3>';
        data.sort((a,b)=>b.id-a.id).forEach(x => {
            el.innerHTML += `<div class="entry"><div><b style="font-size:14px">${titleFn(x)}</b><br><small>${x.d||''}</small>${hasNote && x.n ? `<span class="entry-note">${x.n}</span>`:''}</div><div style="font-weight:800">${valFn(x)} Kč <span onclick="remove('${char}',${x.id})" style="color:red; cursor:pointer">×</span></div></div>`;
        });
    }

    function val(i) { return document.getElementById(i).value; }
    function num(i) { return Number(document.getElementById(i).value); }
    render();
</script>
</body>
</html>
